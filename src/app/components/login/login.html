<div class="login-screen">
  <img src="/imagenes/hombre/producto1.png" class="bg-img img1">
  <img src="/imagenes/mujer/producto16.png" class="bg-img img2">
  <img src="/imagenes/joyeria/producto6.png" class="bg-img img3">
  <img src="/imagenes/electronica/producto11.png" class="bg-img img4">
  <img src="/imagenes/hombre/producto5.png" class="bg-img img5">
  <img src="/imagenes/mujer/producto20.png" class="bg-img img6">
  <img src="/imagenes/joyeria/producto10.png" class="bg-img img7">
  <img src="/imagenes/electronica/producto14.png" class="bg-img img8">

    <div class="login-container">
      <h1 style="display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; font-size: 28px;">
        <img src="/imagenes/logo.png" alt="Logo" style="height: 40px;">
        QuickShop
      </h1>
      <p>{{ modoRegistro ? 'Crea tu cuenta para comenzar' : 'Inicia sesión para comenzar a comprar' }}</p>
  
      <div class="error-message" *ngIf="errorMsg">{{ errorMsg }}</div>
      <div class="success-message" *ngIf="successMsg">{{ successMsg }}</div>
  
      <!-- Login -->
<div *ngIf="!modoRegistro">
  <div class="form-group">
    <label>Usuario</label>
    <div class="input-group">
      <span class="icon">👤</span>
      <input type="text" placeholder="Usuario" [(ngModel)]="loginData.username" required>
    </div>
  </div>

  <div class="form-group">
    <label>Contraseña</label>
    <div class="input-group">
      <span class="icon">🔒</span>
      <input type="password" placeholder="••••••••" [(ngModel)]="loginData.password" required>
    </div>
  </div>

  <button class="login-btn" (click)="iniciarSesion()">Iniciar Sesión</button>
</div>
  
      <!-- Registro -->
      <div *ngIf="modoRegistro">
        <div class="form-group">
          <label>Nombre Completo</label>
          <input type="text" placeholder="Ingresa tu nombre completo" [(ngModel)]="registerData.nombre" required>
        </div>
        <div class="form-group">
          <label>Usuario</label>
          <input type="text" placeholder="Usuario" [(ngModel)]="registerData.username" required>
        </div>
        <div class="form-group">
          <label>Correo Electrónico</label>
          <input type="email" placeholder="ejemplo@correo.com" [(ngModel)]="registerData.email" required>
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" placeholder="••••••••" [(ngModel)]="registerData.password" required>
        </div>
        <div class="form-group">
          <label>Confirmar Contraseña</label>
          <input type="password" placeholder="••••••••" [(ngModel)]="registerData.passwordConfirm" required>
        </div>
        <button class="login-btn" (click)="registrarUsuario()">Registrarse</button>
      </div>
  
      <div class="toggle-form">
        <p>
          {{ modoRegistro ? '¿Ya tienes cuenta?' : '¿No tienes cuenta?' }}
          <a href="#" (click)="$event.preventDefault(); toggleFormulario()">
            {{ modoRegistro ? 'Inicia sesión aquí' : 'Regístrate aquí' }}
          </a>
        </p>
      </div>
    </div>
  </div>
