<!-- src/app/pages/iniciar-sesion/iniciar-sesion.html -->
<div class="login-container">
  <h2 class="login-title">Iniciar Sesión</h2>

  <!-- FORMULARIO DE INICIO DE SESIÓN -->
  <form (submit)="onLogin($event)" class="login-form">
    
    <!-- CAMPO DE CORREO ELECTRÓNICO -->
    <div class="form-group">
      <label for="email">Correo Electrónico</label>
      <input id="email" type="email" [(ngModel)]="credentials.email" name="email" required>
    </div>

    <!-- CAMPO DE CONTRASEÑA -->
    <div class="form-group">
      <label for="password">Contraseña</label>
      <input id="password" type="password" [(ngModel)]="credentials.password" name="password" required>
    </div>

    <!-- MOSTRAR MENSAJE DE ERROR SI EXISTE -->
    @if (errorMessage) {
      <p class="error-message">{{ errorMessage }}</p>
    }

    <!-- BOTÓN DE INICIO DE SESIÓN -->
    <button type="submit" class="login-button">Acceder</button>
  </form>

  <!-- ENLACE A LA PÁGINA DE REGISTRO -->
  <p class="register-link">
    ¿No tienes una cuenta? <a routerLink="/registro">Regístrate aquí</a>
  </p>
</div>
